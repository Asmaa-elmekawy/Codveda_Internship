<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Registration | Interactive Form</title>
    <meta name="description" content="A high-performance interactive form with real-time validation.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="form-card">
            <h1>Create Account</h1>
            <p class="subtitle">Join our community today</p>

            <form id="registrationForm" novalidate>
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                    <span class="error-message" id="nameError">Name is required</span>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                    <span class="error-message" id="emailError">Valid email is required</span>
                </div>

                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" required>
                    <span class="error-message" id="phoneError">Invalid phone number format</span>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <span class="error-message" id="passwordError">Password must be at least 8 characters</span>
                </div>

                <button type="submit" id="submitBtn">Register Now</button>
            </form>

            <div id="successMessage" class="success-message hidden">
                <div class="success-icon">✓</div>
                <h3>Registration Successful!</h3>
                <p>Welcome aboard. We've sent a verification email to your inbox.</p>
                <button type="button" onclick="location.reload()">Start New</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
